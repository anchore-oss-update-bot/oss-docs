name: "Bootstrap"

description: "Bootstrap all tools and dependencies"
inputs:
  node-version:
    description: "node version to install"
    required: true
    default: "20"
  dependencies:
    description: "Download dependencies"
    required: true
    default: "true"
  cache-key-prefix:
    description: "Prefix all cache keys with this value"
    required: true
    default: "181053ac82"
  tools:
    description: "whether to install tools"
    default: "true"
  bootstrap-apt-packages:
    description: "Space delimited list of tools to install via apt"
    default: ""
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  uv-version:
    description: "UV version to install"
    required: true
    default: "0.5.16"

runs:
  using: "composite"
  # restore-only caching pattern: PRs (and pushes to fork default branches) read existing
  # caches but never write back. Only pushes to the upstream repo's default branch refresh
  # them. This keeps untrusted runs from polluting or evicting trusted cache entries.
  steps:
    - name: Setup node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      if: inputs.node-version != ''
      with:
        node-version: ${{ inputs.node-version }}
        # npm cache is managed below so untrusted runs cannot write back

    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      if: inputs.python-version != ''
      with:
        # uv cache is managed below so untrusted runs cannot write back
        enable-cache: false

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      if: inputs.python-version != ''
      with:
        python-version: ${{ inputs.python-version }}

    # resolve cache locations so the restore/save steps below stay tool-agnostic
    - name: Resolve npm cache directory
      if: inputs.node-version != ''
      id: npm-cache-dir
      shell: bash
      run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

    - name: Resolve uv cache directory
      if: inputs.python-version != ''
      id: uv-cache-dir
      shell: bash
      run: echo "dir=$(uv cache dir)" >> "$GITHUB_OUTPUT"

    # npm cache: restore-only on non-default branches and forks
    - name: Restore npm cache
      if: ${{ inputs.node-version != '' && (github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true) }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.npm-cache-dir.outputs.dir }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-node-${{ inputs.node-version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-node-${{ inputs.node-version }}-

    # npm cache: restore + save on the upstream default branch only
    - name: Restore and save npm cache
      if: ${{ inputs.node-version != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.npm-cache-dir.outputs.dir }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-node-${{ inputs.node-version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-node-${{ inputs.node-version }}-

    # uv cache: restore-only on non-default branches and forks
    - name: Restore uv cache
      if: ${{ inputs.python-version != '' && (github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true) }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.uv-cache-dir.outputs.dir }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-uv-${{ inputs.uv-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-uv-${{ inputs.uv-version }}-

    # uv cache: restore + save on the upstream default branch only
    - name: Restore and save uv cache
      if: ${{ inputs.python-version != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.uv-cache-dir.outputs.dir }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-uv-${{ inputs.uv-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-uv-${{ inputs.uv-version }}-

    # tool cache: restore-only on non-default branches and forks
    - name: Restore tool cache
      if: ${{ inputs.tools == 'true' && (github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true) }}
      id: tool-cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}

    # tool cache: restore + save on the upstream default branch only
    - name: Restore and save tool cache
      if: ${{ inputs.tools == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}
      id: tool-cache-rw
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}

    - name: Install project tools
      shell: bash
      if: inputs.tools == 'true'
      run: make tools

    - name: Install dependencies
      if: inputs.dependencies == 'true'
      shell: bash
      run: make install

    - name: Install apt packages
      if: inputs.bootstrap-apt-packages != ''
      shell: bash
      env:
        APT_PACKAGES: ${{ inputs.bootstrap-apt-packages }}
      run: |
        IFS=' ' read -ra packages <<< "$APT_PACKAGES"
        DEBIAN_FRONTEND=noninteractive sudo apt update && sudo -E apt install -y "${packages[@]}"

    # ecosystem tool cache: restore-only on non-default branches and forks
    - name: Restore ecosystem tool cache
      if: ${{ inputs.tools == 'true' && (github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true) }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-ecosystem-tool

    # ecosystem tool cache: restore + save on the upstream default branch only
    - name: Restore and save ecosystem tool cache
      if: ${{ inputs.tools == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-ecosystem-tool
