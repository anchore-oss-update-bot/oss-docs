name: "Bootstrap"

description: "Bootstrap all tools and dependencies"
inputs:
  node-version:
    description: "node version to install"
    required: true
    default: "20"
  dependencies:
    description: "Download dependencies"
    required: true
    default: "true"
  cache-key-prefix:
    description: "Prefix all cache keys with this value"
    required: true
    default: "181053ac82"
  tools:
    description: "whether to install tools"
    default: "true"
  bootstrap-apt-packages:
    description: "Space delimited list of tools to install via apt"
    default: ""
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  uv-version:
    description: "UV version to install"
    required: true
    default: "0.5.16"

runs:
  using: "composite"
  steps:
    - name: Setup node.js
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      if: inputs.node-version != ''
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      if: inputs.python-version != ''
      with:
        enable-cache: true

    - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
      if: inputs.python-version != ''
      with:
        python-version: ${{ inputs.python-version }}

    - name: Restore tool cache
      if: inputs.tools == 'true'
      id: tool-cache
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}

    - name: Install project tools
      shell: bash
      if: inputs.tools == 'true'
      run: make tools

    - name: Install dependencies
      if: inputs.dependencies == 'true'
      shell: bash
      run: make install

    - name: Install apt packages
      if: inputs.bootstrap-apt-packages != ''
      shell: bash
      env:
        APT_PACKAGES: ${{ inputs.bootstrap-apt-packages }}
      run: |
        IFS=' ' read -ra packages <<< "$APT_PACKAGES"
        DEBIAN_FRONTEND=noninteractive sudo apt update && sudo -E apt install -y "${packages[@]}"

    - name: Restore ecosystem tool cache
      if: inputs.tools == 'true'
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-ecosystem-tool
