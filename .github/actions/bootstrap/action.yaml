name: "Bootstrap"

description: "Bootstrap all tools and dependencies"
inputs:
  node-version:
    description: "node version to install"
    required: true
    default: "20"
  dependencies:
    description: "Download dependencies"
    required: true
    default: "true"
  cache-key-prefix:
    description: "Prefix all cache keys with this value"
    required: true
    default: "181053ac82"
  tools:
    description: "whether to install tools"
    default: "true"
  bootstrap-apt-packages:
    description: "Space delimited list of tools to install via apt"
    default: ""
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  uv-version:
    description: "UV version to install"
    required: true
    default: "0.5.16"

runs:
  using: "composite"
  steps:
    - name: Setup node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
      if: inputs.node-version != ''
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - uses: astral-sh/setup-uv@d9e0f98d3fc6adb07d1e3d37f3043649ddad06a1 # v6.5.0
      if: inputs.python-version != ''
      with:
        enable-cache: true

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      if: inputs.python-version != ''
      with:
        python-version: ${{ inputs.python-version }}

    - name: Restore tool cache
      if: inputs.tools == 'true'
      id: tool-cache
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}

    - name: Install project tools
      shell: bash
      if: inputs.tools == 'true'
      run: make tools

    - name: Install dependencies
      if: inputs.dependencies == 'true'
      shell: bash
      run: make install

    - name: Install apt packages
      if: inputs.bootstrap-apt-packages != ''
      shell: bash
      env:
        APT_PACKAGES: ${{ inputs.bootstrap-apt-packages }}
      run: |
        IFS=' ' read -ra packages <<< "$APT_PACKAGES"
        DEBIAN_FRONTEND=noninteractive sudo apt update && sudo -E apt install -y "${packages[@]}"

    - name: Restore ecosystem tool cache
      if: inputs.tools == 'true'
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ github.workspace }}/.cache
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-ecosystem-tool
