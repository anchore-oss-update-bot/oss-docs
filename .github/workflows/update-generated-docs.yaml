name: Update Generated Documentation

on:
  schedule:
    # run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/generate_*'
      - 'tasks.d/generate.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  SLACK_NOTIFICATIONS: true

jobs:
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Generate documentation
        run: |
          echo "Generating documentation..."
          make generate:update

      - name: Check for changes
        id: check-changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes detected"
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in documentation"
            echo "has-changes=true" >> $GITHUB_OUTPUT

            # Show what changed
            echo "Changed files:"
            git diff --name-only

            # Show diff stats
            echo "Diff summary:"
            git diff --stat
          fi

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 #v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.TOKEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_APP_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          signoff: true
          commit-message: |
            Update generated documentation
          title: "📚 Update generated documentation"
          body: |
            This PR contains automatic updates to the documentation generated from the latest tool container images (from the `update-generated-docs` workflow).
          branch: update-generated-docs
          labels: |
            documentation
            automated
          draft: false
          delete-branch: true

      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a #v2.1.1
        if: ${{ failure() && env.SLACK_NOTIFICATIONS == 'true' }}
        with:
          webhook: ${{ secrets.SLACK_TOOLBOX_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "oss-docs generated documentation update failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *oss-docs generated documentation update failed*
                    • Workflow: `${{ github.workflow }}`
                    • Event: `${{ github.event_name }}`
                    • Job Status: `${{ job.status }}`
                    • <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>
