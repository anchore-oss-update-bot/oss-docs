name: Update Generated Documentation

on:
  schedule:
    # run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/generate_*'
      - 'tasks.d/generate.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          submodules: true
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Generate documentation
        run: |
          echo "Generating documentation..."
          make generate:update

      - name: Check for changes
        id: check-changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes detected"
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in documentation"
            echo "has-changes=true" >> $GITHUB_OUTPUT

            # Show what changed
            echo "Changed files:"
            git diff --name-only

            # Show diff stats
            echo "Diff summary:"
            git diff --stat
          fi

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf #v2.2.1
        id: generate-token
        with:
          app-id: ${{ secrets.TOKEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_APP_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725  # v8.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          signoff: true
          commit-message: |
            Update generated documentation
          title: "📚 Update generated documentation"
          body: |
            This PR contains automatic updates to the documentation generated from the latest tool container images (from the `update-generated-docs` workflow).
          branch: update-generated-docs-${{ github.ref }}
          labels: |
            documentation
            automated
          draft: false
          delete-branch: true
