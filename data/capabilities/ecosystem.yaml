alias:
  alpine: apk

display_names:
  alpm: ALPM
  apk: APK
  binary: Binary
  bitnami: Bitnami
  c++: C/C++
  conda: Conda
  dart: Dart
  dotnet: .NET
  dpkg: DPKG
  elixir: Elixir
  erlang: Erlang
  github-actions: GitHub Actions
  go: Go
  haskell: Haskell
  homebrew: Homebrew
  java: Java
  javascript: JavaScript
  linux: Linux
  lua: Lua
  mariner: Azure Linux
  nix: Nix
  ocaml: OCaml
  php: PHP
  portage: Portage
  prolog: Prolog
  python: Python
