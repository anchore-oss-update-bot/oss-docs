# the default is to run these on commit + push
default_stages:
  - pre-push

repos:
  # Universal repository concerns (not stack-specific)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.4.0
    hooks:
      # prevent giant files from being committed
      - id: check-added-large-files
        stages:
          - pre-push

      # checks for a common error of placing code before the docstring
      - id: check-docstring-first
        stages:
          - pre-push

      # attempts to load all yaml files to verify syntax
      - id: check-yaml
        stages:
          - pre-push

      # attempts to load all json files to verify syntax
      - id: check-json
        stages:
          - pre-push

      # makes sure files end in a newline and only a newline
      - id: end-of-file-fixer
        exclude: '^tests/.*/(fixtures|snapshots)/'
        stages:
          - pre-push

      # trims trailing whitespace
      - id: trailing-whitespace
        stages:
          - pre-push

      # check for files that contain merge conflict strings
      - id: check-merge-conflict
        stages:
          - pre-push

      # simply check whether files parse as valid python
      - id: check-ast
        stages:
          - pre-push

      # check for files with names that would conflict on a case-insensitive filesystem like MacOS HFS+ or Windows FAT
      - id: check-case-conflict
        stages:
          - pre-push

  #  # GitHub Actions linting
  #  - repo: https://github.com/zizmorcore/zizmor-pre-commit
  #    rev: v1.12.1
  #    hooks:
  #      - id: zizmor

  # Stack-specific hooks (delegates to task namespaces)
  - repo: local
    hooks:
      # Hugo/Node stack
      - id: hugo-lint-fix
        name: hugo-lint-fix
        entry: make hugo:lint-fix
        pass_filenames: false
        language: system
        files: \.(md|html|yaml|toml|css|js)$

      # Python stack
      - id: python-lint-fix
        name: python-lint-fix
        entry: make python:lint-fix
        pass_filenames: false
        language: system
        files: \.py$

      - id: python-format
        name: python-format
        entry: make python:format
        pass_filenames: false
        language: system
        files: \.py$

      - id: python-types
        name: python-types
        entry: make python:check-types
        pass_filenames: false
        language: system
        files: \.py$
