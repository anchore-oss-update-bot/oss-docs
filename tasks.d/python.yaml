
version: "3"

env:
  MAKEFLAGS: "--no-print-directory"
  FORCE_COLOR: true

tasks:

  default:
    cmds:
      - task: validate

  validate:
    desc: Run all validation tasks
    cmds:
      - task: test
      - task: lint
      - task: check-types

  install:
    desc: Install all development dependencies
    cmds:
      - uv sync --all-extras --dev

  format:
    desc: Format the code
    cmds:
      - uv run ruff format

  lint:
    desc: Run code linters
    cmds:
      - uv run ruff check src tests

  lint-fix:
    desc: Run code lint fixers
    cmds:
      - uv run ruff check src tests --fix
      # the flag prevents pyrefly from using default excludes that match hidden directories
      # (e.g., **/.[!/.]*/**/*), which breaks when CI clones the repo under .cache/
      - uv run pyrefly infer src --disable-project-excludes-heuristics

  test:
    desc: Run all tests
    cmds:
      - task: unit

  unit:
    desc: Run unit tests
    cmds:
      - uv run pytest ./tests/unit -vv --color=yes

  check-types:
    desc: Run ty type checking
    cmds:
      - uv run ty check src
