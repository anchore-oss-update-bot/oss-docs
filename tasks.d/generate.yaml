version: "3"

vars:
  SYFT_CLI_CMD: "uv run ./src/generate_reference_cli_docs.py anchore/syft:latest --output ./content/docs/reference/syft/cli.md --tool-name syft"
  SYFT_CONFIG_CMD: "uv run ./src/generate_reference_config_docs.py anchore/syft:latest --output ./content/docs/reference/syft/configuration.md --tool-name syft"
  SYFT_JSON_SCHEMA_CMD: "uv run ./src/generate_reference_syft_json_schema.py"
  GRYPE_CLI_CMD: "uv run ./src/generate_reference_cli_docs.py anchore/grype:latest --output ./content/docs/reference/grype/cli.md --tool-name grype"
  GRYPE_CONFIG_CMD: "uv run ./src/generate_reference_config_docs.py anchore/grype:latest --output ./content/docs/reference/grype/configuration.md --tool-name grype"
  GRANT_CLI_CMD: "uv run ./src/generate_reference_cli_docs.py anchore/grant:latest --output ./content/docs/reference/grant/cli.md --tool-name grant"
  GRANT_CONFIG_CMD: "uv run ./src/generate_reference_config_docs.py anchore/grant:latest --output ./content/docs/reference/grant/configuration.md --tool-name grant"
  FORMAT_EXAMPLES_CMD: "uv run ./src/generate_format_examples.py"
  FORMAT_VERSIONS_CMD: "uv run ./src/generate_format_versions.py"
  JQ_EXAMPLES_CMD: "uv run ./src/generate_jq_query_examples.py"
  TEMPLATE_EXAMPLES_CMD: "uv run ./src/generate_template_examples.py"
  PACKAGE_CAPABILITIES_CMD: "uv run ./src/generate_capability_package_tables.py"
  VULNERABILITY_CAPABILITIES_CMD: "uv run ./src/generate_capability_vulnerability_tables.py"
  DATA_SOURCES_CMD: "uv run ./src/generate_data_source_tables.py"
  SUPPORTED_OS_CMD: "uv run ./src/generate_supported_os_table.py"

tasks:
  default:
    desc: Generate all documentation using existing caches
    cmds:
      - "{{.SYFT_CLI_CMD}}"
      - "{{.SYFT_CONFIG_CMD}}"
      - "{{.SYFT_JSON_SCHEMA_CMD}}"
      - "{{.GRYPE_CLI_CMD}}"
      - "{{.GRYPE_CONFIG_CMD}}"
      - "{{.GRANT_CLI_CMD}}"
      - "{{.GRANT_CONFIG_CMD}}"
      - "{{.FORMAT_EXAMPLES_CMD}}"
      - "{{.FORMAT_VERSIONS_CMD}}"
      - "{{.JQ_EXAMPLES_CMD}}"
      - "{{.TEMPLATE_EXAMPLES_CMD}}"
      - "{{.PACKAGE_CAPABILITIES_CMD}}"
      - "{{.VULNERABILITY_CAPABILITIES_CMD}}"
      - "{{.DATA_SOURCES_CMD}}"
      - "{{.SUPPORTED_OS_CMD}}"
      - "make lint-fix || true"
      - "uv run pre-commit run end-of-file-fixer --all-files || true"
      - "uv run pre-commit run trailing-whitespace --all-files || true"
      - "make validate"

  update:
    desc: Deletes all data caches and generate all documentation
    cmds:
      - "{{.SYFT_CLI_CMD}} --update"
      - "{{.SYFT_CONFIG_CMD}} --update"
      - "{{.SYFT_JSON_SCHEMA_CMD}} --update"
      - "{{.GRYPE_CLI_CMD}} --update"
      - "{{.GRYPE_CONFIG_CMD}} --update"
      - "{{.GRANT_CLI_CMD}} --update"
      - "{{.GRANT_CONFIG_CMD}} --update"
      - "{{.FORMAT_EXAMPLES_CMD}} --update"
      - "{{.FORMAT_VERSIONS_CMD}} --update"
      - "{{.JQ_EXAMPLES_CMD}} --update"
      - "{{.TEMPLATE_EXAMPLES_CMD}} --update"
      - "{{.PACKAGE_CAPABILITIES_CMD}} --update"
      - "{{.VULNERABILITY_CAPABILITIES_CMD}} --update"
      - "{{.DATA_SOURCES_CMD}} --update"
      - "{{.SUPPORTED_OS_CMD}}"
      - "make lint-fix || true"
      - "uv run pre-commit run end-of-file-fixer --all-files || true"
      - "uv run pre-commit run trailing-whitespace --all-files || true"
      - "make validate"

  update-release-notes:
    desc: Generate release notes for all projects
    dir: scripts
    cmds:
      - ./generate-release-notes.sh

  update-adopters:
    desc: Update adopters information
    dir: scripts
    cmds:
      - ./generate-adopters-info.sh
