version: '3'

vars:
  SYFT_CLI_CMD: "uv run ./scripts/generate_reference_cli_docs.py anchore/syft:latest --output ./content/docs/reference/syft/cli.md --tool-name syft"
  SYFT_CONFIG_CMD: "uv run ./scripts/generate_reference_config_docs.py anchore/syft:latest --output ./content/docs/reference/syft/config.md --tool-name syft"
  GRYPE_CLI_CMD: "uv run ./scripts/generate_reference_cli_docs.py anchore/grype:latest --output ./content/docs/reference/grype/cli.md --tool-name grype"
  GRYPE_CONFIG_CMD: "uv run ./scripts/generate_reference_config_docs.py anchore/grype:latest --output ./content/docs/reference/grype/config.md --tool-name grype"
  FORMAT_EXAMPLES_CMD: "uv run ./scripts/generate_format_examples.py"
  FORMAT_VERSIONS_CMD: "uv run ./scripts/generate_format_versions.py"
  JQ_EXAMPLES_CMD: "uv run ./scripts/generate_jq_query_examples.py"
  TEMPLATE_EXAMPLES_CMD: "uv run ./scripts/generate_template_examples.py"
  PACKAGE_CAPABILITIES_CMD: "uv run ./scripts/generate_capability_package_tables.py"
  VULNERABILITY_CAPABILITIES_CMD: "uv run ./scripts/generate_capability_vulnerability_tables.py"

tasks:
  default:
    desc: Generate all documentation using existing caches
    cmds:
      - "{{.SYFT_CLI_CMD}}"
      - "{{.SYFT_CONFIG_CMD}}"
      - "{{.GRYPE_CLI_CMD}}"
      - "{{.GRYPE_CONFIG_CMD}}"
      - "{{.FORMAT_EXAMPLES_CMD}}"
      - "{{.FORMAT_VERSIONS_CMD}}"
      - "{{.JQ_EXAMPLES_CMD}}"
      - "{{.TEMPLATE_EXAMPLES_CMD}}"
      - "{{.PACKAGE_CAPABILITIES_CMD}}"
      - "{{.VULNERABILITY_CAPABILITIES_CMD}}"

  update:
    desc: Deletes all data caches and generate all documentation
    cmds:
      - "{{.SYFT_CLI_CMD}} --update"
      - "{{.SYFT_CONFIG_CMD}} --update"
      - "{{.GRYPE_CLI_CMD}} --update"
      - "{{.GRYPE_CONFIG_CMD}} --update"
      - "{{.FORMAT_EXAMPLES_CMD}} --update"
      - "{{.FORMAT_VERSIONS_CMD}} --update"
      - "{{.JQ_EXAMPLES_CMD}} --update"
      - "{{.TEMPLATE_EXAMPLES_CMD}} --update"
      - "{{.PACKAGE_CAPABILITIES_CMD}} --update"
      - "{{.VULNERABILITY_CAPABILITIES_CMD}} --update"

  update-release-notes:
    desc: Generate release notes for all projects
    dir: scripts
    cmds:
      - ./generate-release-notes.sh

  update-adopters:
    desc: Update adopters information
    dir: scripts
    cmds:
      - ./generate-adopters-info.sh
